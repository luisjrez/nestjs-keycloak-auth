name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: auth_demo
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build auth package
        run: pnpm --filter @luisjrez/nestjs-keycloak-auth build

      - name: Push Prisma schema
        run: pnpm --filter demo-api exec prisma db push --accept-data-loss --force-reset
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/auth_demo

      - name: Start Docker services (Keycloak + Mailpit)
        run: docker compose -f docker/docker-compose.yml up -d
        env:
          POSTGRES_HOST: postgres

      - name: Wait for Keycloak
        run: |
          for i in $(seq 1 60); do
            curl -s http://localhost:8080/realms/master > /dev/null 2>&1 && break
            sleep 2
          done

      - name: E2E tests
        run: pnpm test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/auth_demo
          KEYCLOAK_SERVER_URL: http://localhost:8080

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
