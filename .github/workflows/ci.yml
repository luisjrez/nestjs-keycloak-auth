name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Without a generated client, PrismaClient degrades to an index
      # signature and typecheck fails with TS4111.
      - name: Generate Prisma client
        run: pnpm --filter demo-api exec prisma generate

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build auth package
        run: pnpm --filter @luisjrez/nestjs-keycloak-auth build

      # docker-compose provides Keycloak (:8080), Mailpit (:1025/:8025),
      # Keycloak's postgres (:5433) and the demo-api postgres (:5434).
      - name: Start Docker services
        run: docker compose -f docker/docker-compose.yml up -d

      - name: Wait for demo-api database
        run: |
          for i in $(seq 1 30); do
            docker exec kc-auth-demo-db pg_isready -U auth_demo > /dev/null 2>&1 && break
            sleep 2
          done

      - name: Wait for Keycloak
        run: |
          for i in $(seq 1 60); do
            curl -s http://localhost:8080/realms/master > /dev/null 2>&1 && break
            sleep 2
          done

      - name: Generate Prisma client and push schema
        run: pnpm --filter demo-api exec prisma db push --accept-data-loss --force-reset
        env:
          DATABASE_URL: postgresql://auth_demo:auth_demo@localhost:5434/auth_demo

      - name: E2E tests
        run: pnpm test:e2e
        env:
          DATABASE_URL: postgresql://auth_demo:auth_demo@localhost:5434/auth_demo
          KEYCLOAK_SERVER_URL: http://localhost:8080

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
