<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="nestjs-keycloak-auth logo">
  <defs>
    <linearGradient id="shieldGraphite" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#3B4252"/>
      <stop offset="100%" stop-color="#151A26"/>
    </linearGradient>
    <linearGradient id="keyGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#E8A020"/>
    </linearGradient>
    <clipPath id="shieldClip">
      <path d="M128 18 L218 51 V121 C218 173 181 214 128 238 C75 214 38 173 38 121 V51 Z"/>
    </clipPath>
  </defs>

  <!-- Graphite shield -->
  <path d="M128 18 L218 51 V121 C218 173 181 214 128 238 C75 214 38 173 38 121 V51 Z" fill="url(#shieldGraphite)"/>

  <!-- Subtle top facet -->
  <path d="M128 18 L218 51 L128 84 L38 51 Z" fill="#FFFFFF" opacity="0.12" clip-path="url(#shieldClip)"/>

  <!-- Gold rim so the shield reads on dark backgrounds -->
  <path d="M128 18 L218 51 V121 C218 173 181 214 128 238 C75 214 38 173 38 121 V51 Z" fill="none" stroke="url(#keyGold)" stroke-width="6" stroke-linejoin="round"/>

  <!-- Gold key -->
  <g fill="url(#keyGold)">
    <path fill-rule="evenodd" d="M128 74 a30 30 0 1 1 0 60 a30 30 0 1 1 0-60 Z M128 91 a13 13 0 1 0 0 26 a13 13 0 1 0 0-26 Z"/>
    <path d="M121 132 h14 v54 a7 7 0 0 1 -7 7 a7 7 0 0 1 -7 -7 Z"/>
    <rect x="128" y="152" width="22" height="11" rx="4"/>
    <rect x="128" y="169" width="17" height="11" rx="4"/>
  </g>
</svg>
